<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الاستراتيجي الماسي V33</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f0f4f8; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen">

<div id="loginScreen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900 bg-opacity-80 p-4">
    <div class="glass w-full max-w-md rounded-2xl p-8 shadow-2xl border border-blue-500">
        <div class="text-center mb-8">
            <i class="fas fa-shield-halved text-5xl text-blue-600 mb-4"></i>
            <h2 class="text-2xl font-bold text-slate-800">مرحباً م. أيمن</h2>
            <p class="text-slate-500">نظام الإدارة الماسي - الدخول الآمن</p>
        </div>
        <div class="space-y-4">
            <input type="text" id="usernameInput" placeholder="اسم المستخدم" class="w-full p-3 rounded-lg border focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            <input type="password" id="passwordInput" placeholder="كلمة المرور" class="w-full p-3 rounded-lg border focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-all shadow-lg">دخول</button>
            <button onclick="showForgotPass()" class="w-full text-sm text-blue-600 hover:underline">نسيت كلمة المرور؟</button>
        </div>
    </div>
</div>

<div id="forgotPassScreen" class="fixed inset-0 z-[60] hidden flex items-center justify-center bg-slate-900 p-4">
    <div class="glass w-full max-w-md rounded-2xl p-8 shadow-2xl border border-yellow-500">
        <h3 class="text-xl font-bold mb-4">استعادة الحساب</h3>
        <p class="text-sm text-gray-600 mb-4">سيتم إرسال رمز التحقق إلى البريد المسجل في الإعدادات.</p>
        <input type="email" id="resetEmailInput" placeholder="أدخل بريدك الإلكتروني" class="w-full p-3 rounded-lg border mb-4">
        <button onclick="sendResetCode()" class="w-full bg-yellow-500 text-white py-3 rounded-lg font-bold">إرسال رمز الاستعادة</button>
        <button onclick="hideForgotPass()" class="w-full mt-4 text-gray-500">إلغاء</button>
    </div>
</div>

<div id="mainApp" class="hidden pb-20">
    <nav class="bg-blue-600 text-white p-4 sticky top-0 z-40 shadow-lg">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="font-bold text-xl"><i class="fas fa-gem ml-2 text-blue-200"></i>الاستراتيجي الماسي V33</h1>
            <span id="userBadge" class="text-xs bg-blue-500 px-3 py-1 rounded-full border border-blue-400">مستشار استراتيجي</span>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 mt-4">
        
        <div id="customers" class="tab-content active space-y-4">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-bold mb-4 text-blue-800"><i class="fas fa-user-plus ml-2"></i>إضافة عميل جديد</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="custName" placeholder="اسم العميل" class="p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    <input type="number" id="custBalance" placeholder="المديونية الحالية" class="p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    <button onclick="addCustomer()" class="bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition-all">حفظ العميل</button>
                </div>
            </div>
            <div id="customerList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>

        <div id="transactions" class="tab-content space-y-4">
            <div class="bg-white p-6 rounded-xl shadow-sm">
                <h2 class="text-lg font-bold mb-4 text-green-800">تسجيل عملية مالية</h2>
                <select id="transTarget" class="w-full p-3 border rounded-lg mb-4 outline-none"></select>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <input type="number" id="transAmount" placeholder="المبلغ" class="p-3 border rounded-lg outline-none">
                    <select id="transType" class="p-3 border rounded-lg outline-none">
                        <option value="debt">مديونية جديدة (+)</option>
                        <option value="pay">سداد مالي (-)</option>
                    </select>
                </div>
                <button onclick="processTransaction()" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg">تحديث الحساب</button>
            </div>
        </div>

        <div id="settings" class="tab-content space-y-4">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-blue-200">
                <h2 class="text-lg font-bold mb-6 text-slate-800"><i class="fas fa-cog ml-2"></i>إعدادات الملف الشخصي</h2>
                <div class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-gray-500 mb-1">الاسم بالكامل</label>
                            <input type="text" id="setFullName" class="w-full p-3 border rounded-lg">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-500 mb-1">رقم الجوال</label>
                            <input type="text" id="setPhone" class="w-full p-3 border rounded-lg">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-500 mb-1">البريد الإلكتروني</label>
                        <input type="email" id="setEmail" class="w-full p-3 border rounded-lg">
                    </div>
                    <hr class="my-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-blue-50 p-4 rounded-lg text-black">
                        <div>
                            <label class="block text-sm text-blue-700 mb-1 font-bold">اسم الدخول</label>
                            <input type="text" id="setLoginUser" class="w-full p-3 border-blue-200 border rounded-lg">
                        </div>
                        <div>
                            <label class="block text-sm text-blue-700 mb-1 font-bold">كلمة المرور الجديدة</label>
                            <input type="password" id="setLoginPass" class="w-full p-3 border-blue-200 border rounded-lg">
                        </div>
                    </div>
                    <button onclick="saveSettings()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg shadow-md hover:bg-blue-700">حفظ كافة التغييرات</button>
                    <button onclick="logout()" class="w-full text-red-500 text-sm mt-4 hover:underline">تسجيل الخروج من النظام</button>
                </div>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around p-3 shadow-xl">
        <button onclick="switchTab('customers')" class="flex flex-col items-center text-blue-600 active-tab"><i class="fas fa-users text-xl"></i><span class="text-[10px]">العملاء</span></button>
        <button onclick="switchTab('transactions')" class="flex flex-col items-center text-gray-400"><i class="fas fa-exchange-alt text-xl"></i><span class="text-[10px]">العمليات</span></button>
        <button onclick="switchTab('settings')" class="flex flex-col items-center text-gray-400"><i class="fas fa-cog text-xl"></i><span class="text-[10px]">الإعدادات</span></button>
    </nav>
</div>

<script>
    // تهيئة البيانات الأولية
    let customers = JSON.parse(localStorage.getItem('customers')) || [];
    let userData = JSON.parse(localStorage.getItem('userSettings')) || {
        fullName: "أيمن الحميري",
        phone: "غير مسجل",
        email: "ayman@example.com",
        username: "admin",
        password: "123"
    };

    function login() {
        const u = document.getElementById('usernameInput').value;
        const p = document.getElementById('passwordInput').value;
        if (u === userData.username && p === userData.password) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').classList.remove('hidden');
            loadSettings();
            renderCustomers();
        } else {
            alert('خطأ في بيانات الدخول! استعمل ' + userData.username + ' / ' + userData.password + ' إذا نسيت.');
        }
    }

    function showForgotPass() { document.getElementById('forgotPassScreen').classList.remove('hidden'); }
    function hideForgotPass() { document.getElementById('forgotPassScreen').classList.add('hidden'); }

    function sendResetCode() {
        const email = document.getElementById('resetEmailInput').value;
        if (email === userData.email) {
            alert(`تم إرسال رمز استعادة الحساب إلى ${email}. (هذه محاكاة تجريبية للنظام) \n كلمة مرورك الحالية هي: ${userData.password}`);
            hideForgotPass();
        } else {
            alert('هذا البريد غير مطابق للمسجل في الإعدادات!');
        }
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        document.querySelectorAll('nav.fixed button').forEach(b => b.classList.replace('text-blue-600', 'text-gray-400'));
        event.currentTarget.classList.replace('text-gray-400', 'text-blue-600');
    }

    // إدارة الإعدادات
    function loadSettings() {
        document.getElementById('setFullName').value = userData.fullName;
        document.getElementById('setPhone').value = userData.phone;
        document.getElementById('setEmail').value = userData.email;
        document.getElementById('setLoginUser').value = userData.username;
        document.getElementById('setLoginPass').value = userData.password;
        document.getElementById('userBadge').innerText = userData.fullName;
    }

    function saveSettings() {
        userData = {
            fullName: document.getElementById('setFullName').value,
            phone: document.getElementById('setPhone').value,
            email: document.getElementById('setEmail').value,
            username: document.getElementById('setLoginUser').value,
            password: document.getElementById('setLoginPass').value
        };
        localStorage.setItem('userSettings', JSON.stringify(userData));
        alert('تم حفظ الإعدادات وتحديث بيانات الدخول بنجاح!');
        location.reload();
    }

    function logout() {
        location.reload();
    }

    // إدارة العملاء (محتفظ بها كما هي)
    function addCustomer() {
        const name = document.getElementById('custName').value;
        const balance = parseFloat(document.getElementById('custBalance').value) || 0;
        if (name) {
            customers.push({ id: Date.now(), name, balance });
            saveAndRender();
            document.getElementById('custName').value = '';
            document.getElementById('custBalance').value = '';
        }
    }

    function processTransaction() {
        const targetId = document.getElementById('transTarget').value;
        const amount = parseFloat(document.getElementById('transAmount').value) || 0;
        const type = document.getElementById('transType').value;
        const index = customers.findIndex(c => c.id == targetId);
        if (index !== -1 && amount > 0) {
            customers[index].balance += (type === 'debt' ? amount : -amount);
            saveAndRender();
            alert('تم تحديث الرصيد بنجاح');
        }
    }

    function saveAndRender() {
        localStorage.setItem('customers', JSON.stringify(customers));
        renderCustomers();
    }

    function renderCustomers() {
        const list = document.getElementById('customerList');
        const select = document.getElementById('transTarget');
        list.innerHTML = ''; select.innerHTML = '';
        customers.forEach(c => {
            list.innerHTML += `
                <div class="bg-white p-4 rounded-xl shadow-sm border-r-4 ${c.balance >= 0 ? 'border-red-500' : 'border-green-500'}">
                    <h3 class="font-bold">${c.name}</h3>
                    <p class="text-2xl font-bold mt-2">${c.balance.toLocaleString()} ريال</p>
                    <p class="text-xs text-gray-400 mt-1">${c.balance >= 0 ? 'مديونية عليه' : 'له رصيد'}</p>
                </div>
            `;
            select.innerHTML += `<option value="${c.id}">${c.name}</option>`;
        });
    }
</script>
</body>
</html>
