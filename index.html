<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الاستراتيجي الماسي - التحديث التراكمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap');
        :root { --primary: #2563eb; --whatsapp: #25d366; --bg: #f8fafc; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); color: #1e293b; touch-action: manipulation; }
        .tab-content { display: none; animation: fadeIn 0.3s ease-in-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card-premium { background: white; border-radius: 24px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .nav-active { color: var(--primary); font-weight: 900; }
        #toast-container { position: fixed; top: env(safe-area-inset-top, 20px); left: 20px; z-index: 9999; }
        .toast { padding: 12px 24px; border-radius: 15px; color: white; font-weight: bold; box-shadow: 0 10px 15px rgba(0,0,0,0.1); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; padding: 15px; backdrop-filter: blur(5px); }
        .modal.active { display: flex; }
        .trans-deposit { background-color: #f0fdf4; border-right: 4px solid #10b981; }
        .trans-withdraw { background-color: #fef2f2; border-right: 4px solid #ef4444; }
        @media print { .no-print { display: none !important; } .print-only { display: block !important; } }
        /* تحسينات الجوال */
        @media (max-width: 640px) {
            .nav-text { font-size: 10px; }
            .card-premium { border-radius: 20px; padding: 15px !important; }
            h1 { font-size: 16px !important; }
        }
    </style>
</head>
<body class="pb-24">

<div id="toast-container"></div>

<div id="authScreen" class="fixed inset-0 z-[110] flex items-center justify-center bg-slate-900 p-4 no-print">
    <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl text-center">
        <div id="loginBox">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl mx-auto mb-4 flex items-center justify-center text-white text-2xl shadow-lg"><i class="fas fa-lock"></i></div>
            <h2 class="text-xl font-black mb-6">الدخول السحابي</h2>
            <div class="space-y-3">
                <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" class="w-full p-4 bg-slate-50 rounded-xl outline-none font-bold border focus:border-blue-500 transition-all">
                <input type="password" id="loginPass" placeholder="كلمة المرور" class="w-full p-4 bg-slate-50 rounded-xl outline-none font-bold border focus:border-blue-500 transition-all">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl shadow-md active:scale-95 transition-all">دخول</button>
                <button onclick="toggleAuth(false)" class="text-slate-400 text-xs mt-4">إنشاء حساب جديد</button>
            </div>
        </div>
        <div id="signUpBox" class="hidden">
            <h2 class="text-xl font-black mb-6">تسجيل حساب</h2>
            <div class="space-y-3">
                <input type="text" id="regName" placeholder="الاسم" class="w-full p-4 bg-slate-50 rounded-xl border font-bold">
                <input type="email" id="regEmail" placeholder="البريد" class="w-full p-4 bg-slate-50 rounded-xl border font-bold">
                <input type="password" id="regPass" placeholder="كلمة المرور" class="w-full p-4 bg-slate-50 rounded-xl border font-bold">
                <button onclick="handleSignUp()" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl">تفعيل</button>
                <button onclick="toggleAuth(true)" class="text-slate-400 text-xs mt-4">لديك حساب؟</button>
            </div>
        </div>
    </div>
</div>

<div id="mainApp" class="hidden">
    <header class="bg-white p-4 sticky top-0 z-40 flex justify-between items-center px-6 no-print border-b shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-md"><i class="fas fa-gem"></i></div>
            <h1 class="font-black text-slate-800">الاستراتيجي الماسي</h1>
        </div>
        <div class="flex gap-2">
            <button onclick="autoRestore()" class="w-9 h-9 bg-blue-50 rounded-lg text-blue-600 flex items-center justify-center"><i class="fas fa-sync-alt"></i></button>
            <button onclick="logout()" class="w-9 h-9 bg-red-50 rounded-lg text-red-500 flex items-center justify-center"><i class="fas fa-power-off"></i></button>
        </div>
    </header>

    <main class="p-4 max-w-4xl mx-auto space-y-6">
        
        <div id="customers" class="tab-content active space-y-4">
            <input type="text" id="searchCust" oninput="renderCustomers()" placeholder="ابحث عن عميل..." class="w-full p-4 rounded-2xl bg-white border shadow-sm font-bold">
            <button onclick="openModal('custModal')" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black">+ إضافة عميل</button>
            <div id="customerList" class="space-y-3"></div>
        </div>

        <div id="transactions" class="tab-content space-y-4">
            <div class="card-premium p-6 space-y-4">
                <h2 class="font-black text-center text-lg">قيد عملية</h2>
                <select id="transTarget" class="w-full p-4 bg-slate-50 rounded-xl font-bold border outline-none"></select>
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="transAmount" placeholder="المبلغ" class="p-4 bg-slate-50 rounded-xl font-black text-center text-xl border">
                    <select id="transCurrency" class="p-4 bg-slate-50 rounded-xl font-bold border"></select>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="setTransType('deposit')" id="typeDep" class="p-4 rounded-xl bg-emerald-50 text-emerald-600 font-black border-2 border-emerald-500">له (+)</button>
                    <button onclick="setTransType('withdraw')" id="typeWith" class="p-4 rounded-xl bg-slate-50 text-slate-400 font-black border-2 border-transparent text-sm">عليه (-)</button>
                </div>
                <textarea id="transNote" placeholder="بيان العملية..." class="w-full p-4 bg-slate-50 rounded-xl h-24 font-bold border outline-none text-sm"></textarea>
                <button onclick="processTransaction()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black shadow-lg">حفظ سحابي</button>
            </div>
        </div>

        <div id="reports" class="tab-content space-y-4">
            <div class="card-premium p-6">
                <select id="reportTarget" onchange="updateAccountReport()" class="w-full p-4 bg-slate-50 rounded-xl font-bold border mb-4"></select>
                <div id="detailedReport" class="space-y-3"></div>
                <div id="reportFooter" class="mt-6 pt-4 border-t-2 border-dashed space-y-2"></div>
            </div>
        </div>

        <div id="settings" class="tab-content space-y-4">
            <div class="card-premium p-6">
                <h3 class="font-black mb-4">الإعدادات</h3>
                <input type="text" id="setUserName" placeholder="الاسم" class="w-full p-4 bg-slate-50 rounded-xl mb-2 font-bold border">
                <button onclick="updateUserProfile()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black">حفظ التعديلات</button>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 inset-x-0 bg-white border-t flex justify-around p-2 pb-6 z-50 no-print shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
        <button onclick="switchTab('customers')" id="nav-customers" class="nav-btn flex flex-col items-center text-slate-400 nav-active">
            <i class="fas fa-users text-lg"></i><span class="nav-text font-bold mt-1">العملاء</span>
        </button>
        <button onclick="switchTab('transactions')" id="nav-transactions" class="nav-btn flex flex-col items-center text-slate-400">
            <i class="fas fa-plus-circle text-lg"></i><span class="nav-text font-bold mt-1">عملية</span>
        </button>
        <button onclick="switchTab('reports')" id="nav-reports" class="nav-btn flex flex-col items-center text-slate-400">
            <i class="fas fa-file-alt text-lg"></i><span class="nav-text font-bold mt-1">التقارير</span>
        </button>
        <button onclick="switchTab('settings')" id="nav-settings" class="nav-btn flex flex-col items-center text-slate-400">
            <i class="fas fa-cog text-lg"></i><span class="nav-text font-bold mt-1">النظام</span>
        </button>
    </nav>
</div>

<div id="custModal" class="modal no-print">
    <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl">
        <h3 class="font-black mb-4">إضافة عميل</h3>
        <input type="text" id="custName" placeholder="الاسم الكامل" class="w-full p-4 bg-slate-50 rounded-xl mb-3 font-bold border">
        <input type="text" id="custPhone" placeholder="رقم الواتساب (مثال: 966...)" class="w-full p-4 bg-slate-50 rounded-xl mb-4 font-bold border">
        <div class="flex gap-2">
            <button onclick="saveCustomer()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-black">حفظ</button>
            <button onclick="closeModal('custModal')" class="flex-1 bg-slate-100 text-slate-500 py-3 rounded-xl font-bold">إلغاء</button>
        </div>
    </div>
</div>

<script>
    let users = JSON.parse(localStorage.getItem('elite_users_v42')) || [];
    let currentUser = JSON.parse(sessionStorage.getItem('active_elite_user')) || null;
    let customers = [], transactions = [], currencies = ['ريال سعودي', 'دولار'], currentType = 'deposit';

    window.onload = () => { if(currentUser) showApp(); };

    function showToast(msg, type = 'success') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = type === 'success' ? '#10b981' : '#ef4444';
        toast.innerHTML = `<i class="fas fa-info-circle"></i> <span class="text-xs">${msg}</span>`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function toggleAuth(isLogin) { document.getElementById('loginBox').classList.toggle('hidden', !isLogin); document.getElementById('signUpBox').classList.toggle('hidden', isLogin); }
    function handleSignUp() { 
        const n = document.getElementById('regName').value, e = document.getElementById('regEmail').value, p = document.getElementById('regPass').value; 
        if(n && e && p) { users.push({ name: n, email: e, pass: p, data: { customers: [], transactions: [] } }); saveUsers(); showToast('تم التفعيل!'); toggleAuth(true); } 
    }
    function handleLogin() { 
        const e = document.getElementById('loginEmail').value, p = document.getElementById('loginPass').value; 
        const user = users.find(u => u.email === e && u.pass === p); 
        if(user) { currentUser = user; sessionStorage.setItem('active_elite_user', JSON.stringify(user)); showApp(); } else showToast('خطأ بالبيانات', 'danger');
    }

    function showApp() {
        document.getElementById('authScreen').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        customers = currentUser.data.customers || [];
        transactions = currentUser.data.transactions || [];
        renderCustomers(); renderCurOptions();
    }

    function renderCustomers() {
        const q = document.getElementById('searchCust').value.toLowerCase();
        const list = document.getElementById('customerList');
        const tSel = document.getElementById('transTarget'), rSel = document.getElementById('reportTarget');
        list.innerHTML = ''; tSel.innerHTML = ''; rSel.innerHTML = '<option value="">اختر عميل للتقرير</option>';
        customers.filter(c => c.name.toLowerCase().includes(q)).forEach(c => {
            const b = getBal(c.id, currencies[0]);
            list.innerHTML += `<div class="card-premium p-4 flex justify-between items-center shadow-sm">
                <div><p class="font-black text-sm">${c.name}</p><p class="text-[10px] text-slate-400">${c.phone || 'بدون رقم'}</p></div>
                <div class="text-left"><p class="font-black text-sm ${b>=0?'text-emerald-600':'text-red-500'}">${b.toLocaleString()} ${currencies[0]}</p></div>
            </div>`;
            tSel.innerHTML += `<option value="${c.id}">${c.name}</option>`;
            rSel.innerHTML += `<option value="${c.id}">${c.name}</option>`;
        });
    }

    function updateAccountReport() {
        const cid = parseInt(document.getElementById('reportTarget').value);
        const container = document.getElementById('detailedReport');
        const footer = document.getElementById('reportFooter');
        if(!cid) { container.innerHTML = ''; footer.innerHTML = ''; return; }
        const c = customers.find(x => x.id === cid);
        const filtered = transactions.filter(t => t.custId === cid).reverse();
        
        // التلوين الشرطي في الكشف
        container.innerHTML = filtered.map(t => `
            <div class="p-4 rounded-xl flex justify-between items-center ${t.amount>0?'trans-deposit':'trans-withdraw'}">
                <div class="flex items-center gap-3">
                    <button onclick="sendWA(${c.id}, ${t.id})" class="text-emerald-500 bg-white w-8 h-8 rounded-full shadow-sm flex items-center justify-center"><i class="fab fa-whatsapp"></i></button>
                    <div><p class="font-black text-xs">${t.note}</p><p class="text-[9px] text-slate-400">${t.date}</p></div>
                </div>
                <p class="font-black text-sm ${t.amount>0?'text-emerald-600':'text-red-600'}">${t.amount>0?'+':'-'} ${Math.abs(t.amount).toLocaleString()}</p>
            </div>
        `).join('');

        // إجمالي الرصيد أسفل الكشف
        footer.innerHTML = currencies.map(cur => {
            const b = getBal(cid, cur);
            return `<div class="flex justify-between items-center font-black"><span>إجمالي الرصيد (${cur}):</span><span class="${b>=0?'text-emerald-600':'text-red-600'}">${b.toLocaleString()}</span></div>`;
        }).join('');
    }

    function sendWA(custId, transId) {
        const c = customers.find(x => x.id === custId);
        const t = transactions.find(x => x.id === transId);
        if(!c.phone) return showToast('لا يوجد رقم واتساب!', 'danger');
        const b = getBal(c.id, t.cur);
        const type = t.amount > 0 ? 'إيداع' : 'سحب';
        const msg = `تم قيد عملية ${type} لحسابكم لدينا: ${c.name}\nالمبلغ: ${Math.abs(t.amount)} ${t.cur}\nالبيان: ${t.note}\nإجمالي حسابكم الحالي هو: ${b} ${t.cur}`;
        window.open(`https://wa.me/${c.phone}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function processTransaction() {
        const id = parseInt(document.getElementById('transTarget').value), amt = parseFloat(document.getElementById('transAmount').value), cur = document.getElementById('transCurrency').value, note = document.getElementById('transNote').value;
        if(!id || !amt) return showToast('أكمل البيانات', 'danger');
        transactions.push({ id: Date.now(), custId: id, amount: currentType==='deposit'?amt:-amt, cur, note: note || 'عملية نقدية', date: new Date().toLocaleDateString('ar-SA') });
        save(); renderCustomers(); showToast('تم الحفظ');
        document.getElementById('transAmount').value = ''; document.getElementById('transNote').value = '';
    }

    function save() { 
        currentUser.data = { customers, transactions }; 
        const idx = users.findIndex(u => u.email === currentUser.email); users[idx] = currentUser; 
        localStorage.setItem('elite_users_v42', JSON.stringify(users)); 
        sessionStorage.setItem('active_elite_user', JSON.stringify(currentUser)); 
    }
    function saveUsers() { localStorage.setItem('elite_users_v42', JSON.stringify(users)); }
    function getBal(cid, cur) { return transactions.filter(t => t.custId === cid && t.cur === cur).reduce((s, t) => s + t.amount, 0); }
    function setTransType(t) { 
        currentType = t; 
        document.getElementById('typeDep').className = t==='deposit'?'p-4 rounded-xl bg-emerald-50 text-emerald-600 font-black border-2 border-emerald-500':'p-4 rounded-xl bg-slate-50 text-slate-400 font-bold border-2 border-transparent text-sm';
        document.getElementById('typeWith').className = t==='withdraw'?'p-4 rounded-xl bg-red-50 text-red-600 font-black border-2 border-red-500':'p-4 rounded-xl bg-slate-50 text-slate-400 font-bold border-2 border-transparent text-sm';
    }
    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    function saveCustomer() {
        const n = document.getElementById('custName').value, p = document.getElementById('custPhone').value;
        if(n) { customers.push({ id: Date.now(), name: n, phone: p }); save(); renderCustomers(); closeModal('custModal'); showToast('تمت الإضافة'); }
    }
    function switchTab(t) { 
        document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active')); 
        document.getElementById(t).classList.add('active'); 
        document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('nav-active'));
        document.getElementById('nav-'+t).classList.add('nav-active');
    }
    function renderCurOptions() { document.getElementById('transCurrency').innerHTML = currencies.map(c => `<option value="${c}">${c}</option>`).join(''); }
    function logout() { sessionStorage.clear(); location.reload(); }
    function autoRestore() { location.reload(); }
</script>
</body>
</html>
