<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الاستراتيجي الماسي V34</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen pb-24 text-slate-800">

<div id="loginScreen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900 p-4">
    <div class="bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl border-t-8 border-blue-600">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold">تسجيل الدخول</h2>
            <p class="text-slate-400 text-sm">مرحباً م. أيمن في نسختك المطورة</p>
        </div>
        <div class="space-y-4">
            <input type="text" id="usernameInput" placeholder="اسم المستخدم" class="w-full p-4 bg-gray-50 rounded-xl border-none ring-1 ring-gray-200 outline-none">
            <input type="password" id="passwordInput" placeholder="كلمة المرور" class="w-full p-4 bg-gray-50 rounded-xl border-none ring-1 ring-gray-200 outline-none">
            <button onclick="login()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 transition-all">دخول</button>
        </div>
    </div>
</div>

<div id="mainApp" class="hidden">
    <header class="bg-white border-b p-4 sticky top-0 z-40 shadow-sm flex justify-between items-center">
        <div>
            <h1 class="font-bold text-xl text-blue-700">الاستراتيجي <span class="text-slate-800">V34</span></h1>
        </div>
        <span id="topUserName" class="text-xs font-bold bg-blue-50 px-3 py-1 rounded-full border border-blue-100">تحميل...</span>
    </header>

    <main class="max-w-6xl mx-auto p-4 space-y-6">
        
        <div id="customers" class="tab-content active space-y-4">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <h2 class="font-bold mb-4 flex items-center"><i class="fas fa-user-plus ml-2 text-blue-600"></i>إدارة العملاء</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    <input type="text" id="custName" placeholder="اسم العميل" class="p-3 bg-gray-50 rounded-xl outline-none ring-1 ring-gray-100">
                    <input type="text" id="custPhone" placeholder="الجوال" class="p-3 bg-gray-50 rounded-xl outline-none ring-1 ring-gray-100">
                    <input type="text" id="custAddress" placeholder="العنوان" class="p-3 bg-gray-50 rounded-xl outline-none ring-1 ring-gray-100">
                    <button onclick="addCustomer()" class="bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition-all">حفظ العميل</button>
                </div>
            </div>
            <div id="customerList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>

        <div id="transactions" class="tab-content space-y-4">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <h2 class="font-bold mb-4"><i class="fas fa-plus-circle ml-2 text-green-600"></i>إضافة عملية جديدة</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <select id="transTarget" class="p-3 bg-gray-50 rounded-xl outline-none ring-1 ring-gray-100"></select>
                    <select id="transCurrency" class="p-3 bg-gray-50 rounded-xl outline-none ring-1 ring-gray-100"></select>
                    <input type="number" id="transAmount" placeholder="المبلغ" class="p-3 bg-gray-50 rounded-xl outline-none ring-1 ring-gray-100">
                    <select id="transType" class="p-3 bg-gray-50 rounded-xl outline-none ring-1 ring-gray-100">
                        <option value="debt">مديونية عليه (+)</option>
                        <option value="pay">سداد له (-)</option>
                    </select>
                </div>
                <textarea id="transNote" placeholder="ملاحظات إضافية..." class="w-full p-3 bg-gray-50 rounded-xl outline-none ring-1 ring-gray-100 mb-4 h-20"></textarea>
                <div class="mb-4">
                    <label class="block text-xs text-gray-400 mb-1">صورة السند (اختياري)</label>
                    <input type="file" id="transImage" class="text-sm">
                </div>
                <button onclick="processTransaction()" class="w-full bg-slate-800 text-white font-bold py-4 rounded-xl shadow-lg">تأكيد وحفظ العملية</button>
            </div>
        </div>

        <div id="reports" class="tab-content space-y-4">
            <div class="bg-white p-6 rounded-3xl shadow-sm">
                <h2 class="font-bold mb-4">كشف حساب تفصيلي</h2>
                <select id="reportTarget" onchange="updateAccountReport()" class="w-full p-3 bg-gray-50 rounded-xl mb-6 outline-none ring-1 ring-gray-100"></select>
                <div id="detailedReport" class="overflow-x-auto">
                    </div>
            </div>
        </div>

        <div id="settings" class="tab-content space-y-4">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <h2 class="font-bold mb-4">إدارة العملات</h2>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="newCurrency" placeholder="مثلاً: ريال سعودي" class="flex-1 p-3 bg-gray-50 rounded-xl outline-none ring-1 ring-gray-100">
                    <button onclick="addCurrency()" class="bg-green-600 text-white px-6 rounded-xl font-bold">إضافة</button>
                </div>
                <div id="currencyList" class="flex flex-wrap gap-2"></div>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                 <h2 class="font-bold mb-4">الملف الشخصي</h2>
                 <input type="text" id="setFullName" placeholder="الاسم" class="w-full p-3 bg-gray-50 rounded-xl mb-2 outline-none">
                 <input type="email" id="setEmail" placeholder="البريد" class="w-full p-3 bg-gray-50 rounded-xl mb-4 outline-none">
                 <button onclick="saveSettings()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">حفظ التغييرات</button>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around p-3 shadow-xl z-50">
        <button onclick="switchTab('customers')" class="nav-btn flex flex-col items-center text-blue-600"><i class="fas fa-users text-lg"></i><span class="text-[10px] mt-1">العملاء</span></button>
        <button onclick="switchTab('transactions')" class="nav-btn flex flex-col items-center text-gray-400"><i class="fas fa-exchange-alt text-lg"></i><span class="text-[10px] mt-1">العمليات</span></button>
        <button onclick="switchTab('reports')" class="nav-btn flex flex-col items-center text-gray-400"><i class="fas fa-chart-bar text-lg"></i><span class="text-[10px] mt-1">التقارير</span></button>
        <button onclick="switchTab('settings')" class="nav-btn flex flex-col items-center text-gray-400"><i class="fas fa-cog text-lg"></i><span class="text-[10px] mt-1">الإعدادات</span></button>
    </nav>
</div>

<script>
    let customers = JSON.parse(localStorage.getItem('cust_v34')) || [];
    let transactions = JSON.parse(localStorage.getItem('trans_v34')) || [];
    let currencies = JSON.parse(localStorage.getItem('cur_v34')) || ['ريال سعودي', 'ريال يمني', 'دولار'];
    let userData = JSON.parse(localStorage.getItem('user_v34')) || { fullName: "أيمن الحميري", username: "admin", password: "123", email: "ayman@mail.com" };

    function login() {
        const u = document.getElementById('usernameInput').value;
        const p = document.getElementById('passwordInput').value;
        if(u === userData.username && p === userData.password) {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            initApp();
        } else { alert('خطأ في البيانات!'); }
    }

    function initApp() {
        document.getElementById('topUserName').innerText = userData.fullName;
        renderCustomers();
        renderCurrencyOptions();
        renderSettings();
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.replace('text-blue-600', 'text-gray-400'));
        event.currentTarget.classList.replace('text-gray-400', 'text-blue-600');
    }

    // إدارة العملاء
    function addCustomer() {
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;
        const address = document.getElementById('custAddress').value;
        if(!name) return;
        customers.push({ id: Date.now(), name, phone, address });
        saveData();
        renderCustomers();
        document.getElementById('custName').value = '';
    }

    function deleteCustomer(id) {
        if(confirm('هل تريد حذف العميل نهائياً؟')) {
            customers = customers.filter(c => c.id !== id);
            transactions = transactions.filter(t => t.custId !== id);
            saveData();
            renderCustomers();
        }
    }

    function renderCustomers() {
        const list = document.getElementById('customerList');
        const transSelect = document.getElementById('transTarget');
        const reportSelect = document.getElementById('reportTarget');
        list.innerHTML = ''; transSelect.innerHTML = ''; reportSelect.innerHTML = '<option value="">اختر عميل للكشف</option>';
        
        customers.forEach(c => {
            list.innerHTML += `
                <div class="bg-white p-5 rounded-3xl border border-gray-100 shadow-sm">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-bold text-lg">${c.name}</h3>
                        <div class="flex gap-2">
                            <button onclick="deleteCustomer(${c.id})" class="text-red-400 hover:text-red-600"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                    <p class="text-xs text-gray-400"><i class="fas fa-phone ml-1"></i> ${c.phone || 'بدون هاتف'}</p>
                    <p class="text-xs text-gray-400 mb-4"><i class="fas fa-map-marker-alt ml-1"></i> ${c.address || 'بدون عنوان'}</p>
                    <div id="balances-${c.id}" class="space-y-1 border-t pt-2"></div>
                </div>
            `;
            transSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`;
            reportSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`;
            renderBalances(c.id);
        });
    }

    function renderBalances(custId) {
        const container = document.getElementById(`balances-${custId}`);
        if(!container) return;
        currencies.forEach(cur => {
            const bal = getBalance(custId, cur);
            if(bal !== 0) {
                container.innerHTML += `
                    <div class="flex justify-between text-sm font-bold">
                        <span>${cur}:</span>
                        <span class="${bal >= 0 ? 'text-red-600' : 'text-green-600'}">${bal.toLocaleString()}</span>
                    </div>
                `;
            }
        });
    }

    // إدارة العمليات والعملات
    function addCurrency() {
        const cur = document.getElementById('newCurrency').value;
        if(cur && !currencies.includes(cur)) {
            currencies.push(cur);
            saveData();
            renderCurrencyOptions();
            document.getElementById('newCurrency').value = '';
        }
    }

    function renderCurrencyOptions() {
        const curSelect = document.getElementById('transCurrency');
        const curList = document.getElementById('currencyList');
        curSelect.innerHTML = ''; curList.innerHTML = '';
        currencies.forEach(cur => {
            curSelect.innerHTML += `<option value="${cur}">${cur}</option>`;
            curList.innerHTML += `<span class="bg-gray-100 px-3 py-1 rounded-full text-xs font-bold">${cur}</span>`;
        });
    }

    async function processTransaction() {
        const custId = parseInt(document.getElementById('transTarget').value);
        const cur = document.getElementById('transCurrency').value;
        const amount = parseFloat(document.getElementById('transAmount').value);
        const type = document.getElementById('transType').value;
        const note = document.getElementById('transNote').value;
        const imgFile = document.getElementById('transImage').files[0];
        
        let imgBase64 = '';
        if(imgFile) {
            imgBase64 = await toBase64(imgFile);
        }

        if(custId && amount > 0) {
            transactions.push({
                id: Date.now(),
                custId,
                cur,
                amount: type === 'debt' ? amount : -amount,
                note,
                img: imgBase64,
                date: new Date().toLocaleString('ar-SA')
            });
            saveData();
            alert('تم حفظ العملية');
            location.reload();
        }
    }

    // التقارير
    function updateAccountReport() {
        const custId = parseInt(document.getElementById('reportTarget').value);
        const container = document.getElementById('detailedReport');
        if(!custId) { container.innerHTML = ''; return; }

        let html = `<table class="w-full text-right text-sm">
            <thead><tr class="bg-gray-50 border-b">
                <th class="p-2">التاريخ</th><th class="p-2">العملة</th><th class="p-2">المبلغ</th><th class="p-2">ملاحظات</th>
            </tr></thead><tbody>`;

        const filtered = transactions.filter(t => t.custId === custId);
        filtered.forEach(t => {
            html += `<tr class="border-b">
                <td class="p-2 text-[10px]">${t.date}</td>
                <td class="p-2">${t.cur}</td>
                <td class="p-2 font-bold ${t.amount >= 0 ? 'text-red-500' : 'text-green-500'}">${Math.abs(t.amount).toLocaleString()}</td>
                <td class="p-2 text-xs">${t.note}</td>
            </tr>`;
        });

        html += `</tbody></table><div class="mt-6 space-y-2">`;
        currencies.forEach(cur => {
            const bal = getBalance(custId, cur);
            if(bal !== 0) {
                html += `<div class="p-3 bg-slate-50 rounded-xl flex justify-between font-bold">
                    <span>الرصيد النهائي (${cur}):</span>
                    <span class="${bal >= 0 ? 'text-red-600' : 'text-green-600'}">${bal.toLocaleString()} ${bal >= 0 ? '(عليه)' : '(له)'}</span>
                </div>`;
            }
        });
        html += `</div>`;
        container.innerHTML = html;
    }

    // دوال مساعدة
    function getBalance(custId, cur) {
        return transactions.filter(t => t.custId === custId && t.cur === cur)
                           .reduce((sum, t) => sum + t.amount, 0);
    }

    function saveData() {
        localStorage.setItem('cust_v34', JSON.stringify(customers));
        localStorage.setItem('trans_v34', JSON.stringify(transactions));
        localStorage.setItem('cur_v34', JSON.stringify(currencies));
        localStorage.setItem('user_v34', JSON.stringify(userData));
    }

    function renderSettings() {
        document.getElementById('setFullName').value = userData.fullName;
        document.getElementById('setEmail').value = userData.email;
    }

    function saveSettings() {
        userData.fullName = document.getElementById('setFullName').value;
        userData.email = document.getElementById('setEmail').value;
        saveData();
        alert('تم الحفظ');
        location.reload();
    }

    const toBase64 = file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });
</script>
</body>
</html>
