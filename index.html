<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الاستراتيجي الماسي V41 - النسخة السحابية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap');
        :root { --primary: #2563eb; --success: #10b981; --danger: #ef4444; --bg: #f1f5f9; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); color: #1e293b; }
        .tab-content { display: none; animation: slideUp 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .card-premium { background: white; border-radius: 28px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        .nav-active { color: var(--primary); font-weight: 900; transform: translateY(-5px); }
        #toast-container { position: fixed; top: 20px; left: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { padding: 16px 24px; border-radius: 18px; color: white; font-weight: bold; box-shadow: 0 15px 30px rgba(0,0,0,0.1); animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); display: flex; align-items: center; gap: 12px; }
        @keyframes bounceIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); z-index: 100; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(8px); }
        .modal.active { display: flex; }
        @media print { .no-print { display: none !important; } .print-only { display: block !important; } }
    </style>
</head>
<body class="min-h-screen pb-32">

<div id="toast-container"></div>

<div id="authScreen" class="fixed inset-0 z-[110] flex items-center justify-center bg-slate-900 p-6 no-print">
    <div class="bg-white w-full max-w-md rounded-[3rem] p-10 shadow-2xl border-4 border-blue-50">
        <div id="loginBox" class="text-center">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto mb-6 flex items-center justify-center text-white text-3xl shadow-xl shadow-blue-200"><i class="fas fa-cloud"></i></div>
            <h2 class="text-3xl font-black mb-2 italic">Cloud Login</h2>
            <p class="text-slate-400 font-bold mb-8">سجل دخولك للوصول لبياناتك السحابية</p>
            <div class="space-y-4">
                <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" class="w-full p-5 bg-slate-50 rounded-2xl ring-1 ring-slate-200 outline-none font-bold focus:ring-2 focus:ring-blue-600 transition-all">
                <input type="password" id="loginPass" placeholder="كلمة المرور" class="w-full p-5 bg-slate-50 rounded-2xl ring-1 ring-slate-200 outline-none font-bold focus:ring-2 focus:ring-blue-600 transition-all">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-lg hover:bg-blue-700 active:scale-95 transition-all">دخول آمن</button>
                <button onclick="toggleAuth(false)" class="text-blue-600 font-bold text-sm mt-4 underline">إنشاء حساب سحابي جديد</button>
            </div>
        </div>
        <div id="signUpBox" class="hidden text-center">
            <h2 class="text-3xl font-black mb-8">فتح حساب جديد</h2>
            <div class="space-y-4">
                <input type="text" id="regName" placeholder="الاسم الكامل" class="w-full p-5 bg-slate-50 rounded-2xl ring-1 ring-slate-200 font-bold">
                <input type="email" id="regEmail" placeholder="البريد الإلكتروني" class="w-full p-5 bg-slate-50 rounded-2xl ring-1 ring-slate-200 font-bold">
                <input type="password" id="regPass" placeholder="تعيين كلمة المرور" class="w-full p-5 bg-slate-50 rounded-2xl ring-1 ring-slate-200 font-bold">
                <button onclick="handleSignUp()" class="w-full bg-emerald-600 text-white font-black py-5 rounded-2xl shadow-lg hover:bg-emerald-700">تفعيل الحساب السحابي</button>
                <button onclick="toggleAuth(true)" class="text-slate-400 font-bold text-sm mt-4 italic">لديك حساب؟ سجل دخولك</button>
            </div>
        </div>
    </div>
</div>

<div id="mainApp" class="hidden">
    <header class="bg-white/90 backdrop-blur-md p-4 sticky top-0 z-40 flex justify-between items-center px-8 no-print border-b">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fas fa-microchip"></i></div>
            <div>
                <h1 class="font-black text-sm">الاستراتيجي الماسي</h1>
                <span class="text-[10px] bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full font-black uppercase">Cloud V41</span>
            </div>
        </div>
        <div class="flex gap-3">
            <button onclick="location.reload()" title="تحديث السحابة" class="w-10 h-10 bg-slate-50 rounded-full text-blue-600 flex items-center justify-center border hover:bg-blue-600 hover:text-white transition-all"><i class="fas fa-sync-alt"></i></button>
            <button onclick="logout()" class="w-10 h-10 bg-red-50 rounded-full text-red-500 flex items-center justify-center border border-red-100 hover:bg-red-500 hover:text-white transition-all"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6 space-y-8">
        <div id="customers" class="tab-content active space-y-6">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4 no-print">
                <div class="relative w-full md:w-96 group">
                    <i class="fas fa-search absolute right-5 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-blue-600 transition-colors"></i>
                    <input type="text" id="searchCust" oninput="renderCustomers()" placeholder="ابحث في قاعدة بياناتك..." class="w-full p-5 pr-14 bg-white rounded-[2rem] shadow-sm border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-600 outline-none font-bold transition-all">
                </div>
                <button onclick="openModal('custModal')" class="w-full md:w-auto bg-blue-600 text-white px-10 py-5 rounded-[2rem] font-black shadow-xl shadow-blue-100 hover:scale-105 active:scale-95 transition-all">+ إضافة عميل</button>
            </div>
            
            <div class="overflow-hidden card-premium no-print">
                <table class="w-full text-right">
                    <thead class="bg-slate-50 text-slate-400 text-[11px] font-black uppercase">
                        <tr>
                            <th class="px-6 py-5">#</th>
                            <th class="px-6 py-5">اسم العميل</th>
                            <th class="px-6 py-5">الأرصدة الحالية</th>
                            <th class="px-6 py-5 text-center">الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="customerTableBody" class="divide-y divide-slate-50 font-bold"></tbody>
                </table>
            </div>
        </div>

        <div id="transactions" class="tab-content max-w-2xl mx-auto no-print">
            <div class="card-premium p-10">
                <h2 class="text-2xl font-black text-center mb-10">قيد عملية مالية</h2>
                <div class="space-y-6">
                    <select id="transTarget" class="w-full p-5 bg-slate-50 rounded-2xl ring-1 ring-slate-100 font-bold outline-none"></select>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="transAmount" placeholder="0.00" class="p-5 bg-slate-50 rounded-2xl ring-1 ring-slate-100 text-center font-black text-3xl text-blue-600 outline-none">
                        <select id="transCurrency" class="p-5 bg-slate-50 rounded-2xl ring-1 ring-slate-100 font-bold outline-none"></select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="setTransType('deposit')" id="typeDep" class="p-5 rounded-2xl bg-emerald-50 text-emerald-600 font-black border-2 border-emerald-500 transition-all">إيداع (+)</button>
                        <button onclick="setTransType('withdraw')" id="typeWith" class="p-5 rounded-2xl bg-slate-50 text-slate-400 font-black border-2 border-transparent transition-all">سحب (-)</button>
                    </div>
                    <textarea id="transNote" placeholder="اكتب بياناً للعملية..." class="w-full p-5 bg-slate-50 rounded-2xl h-28 ring-1 ring-slate-100 outline-none font-bold"></textarea>
                    <button onclick="processTransaction()" class="w-full bg-slate-900 text-white font-black py-6 rounded-3xl shadow-2xl hover:bg-blue-600 transition-all uppercase tracking-widest text-lg">حفظ في السحابة</button>
                </div>
            </div>
        </div>

        <div id="reports" class="tab-content space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 no-print" id="totalSummaryCards"></div>

            <div class="card-premium p-8 no-print">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-xl font-black">كشف الحساب</h2>
                    <div class="flex gap-2">
                        <button onclick="settleAccount()" class="bg-red-50 text-red-600 px-6 py-2 rounded-xl font-bold border border-red-100 hover:bg-red-600 hover:text-white transition-all">تصفية</button>
                        <button onclick="window.print()" class="bg-slate-900 text-white px-6 py-2 rounded-xl font-bold"><i class="fas fa-print ml-2"></i>طباعة</button>
                    </div>
                </div>
                <select id="reportTarget" onchange="updateAccountReport()" class="w-full p-5 bg-slate-50 rounded-2xl ring-1 ring-slate-100 font-bold outline-none"></select>
            </div>
            
            <div id="printArea">
                <div class="print-only hidden text-center mb-10">
                    <h1 class="text-3xl font-black text-blue-600">كشف حساب سحابي - الاستراتيجي V41</h1>
                    <p id="printInfo" class="text-lg mt-2 font-bold"></p>
                    <div class="border-b-4 border-slate-900 mt-6 rounded-full"></div>
                </div>
                <div id="detailedReport" class="space-y-3"></div>
            </div>
        </div>

        <div id="settings" class="tab-content space-y-6 max-w-4xl mx-auto no-print">
            <div class="card-premium p-8">
                <h2 class="text-lg font-black mb-6 border-b pb-4">البروفايل السحابي</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="setUserName" class="p-5 bg-slate-50 rounded-2xl font-bold outline-none border">
                    <input type="email" id="setUserEmail" class="p-5 bg-slate-50 rounded-2xl font-bold outline-none border">
                    <input type="text" id="setUserPhone" placeholder="جوال" class="p-5 bg-slate-50 rounded-2xl font-bold outline-none border">
                    <input type="password" id="setUserPass" placeholder="كلمة مرور جديدة" class="p-5 bg-slate-50 rounded-2xl font-bold outline-none border">
                </div>
                <button onclick="updateUserProfile()" class="mt-8 bg-blue-600 text-white px-12 py-4 rounded-2xl font-black shadow-lg hover:bg-blue-700 transition-all">تحديث بياناتي</button>
            </div>

            <div class="card-premium p-8">
                <h2 class="text-lg font-black mb-6 border-b pb-4">مزامنة البيانات</h2>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="exportData()" class="p-6 bg-slate-900 text-white rounded-3xl font-black shadow-xl hover:bg-blue-600 transition-all flex flex-col items-center gap-2">
                        <i class="fas fa-file-download text-2xl"></i> تصدير نسخة (يدوي)
                    </button>
                    <button onclick="autoRestore()" class="p-6 bg-emerald-600 text-white rounded-3xl font-black shadow-xl hover:bg-emerald-700 transition-all flex flex-col items-center gap-2">
                        <i class="fas fa-magic text-2xl"></i> استعادة تلقائية (آخر نسخة)
                    </button>
                </div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[94%] max-w-lg bg-white/95 backdrop-blur-2xl border border-white p-3 rounded-[3rem] shadow-[0_25px_60px_-15px_rgba(0,0,0,0.3)] flex justify-around z-50 no-print">
        <button onclick="switchTab('customers')" id="nav-customers" class="nav-btn flex flex-col items-center text-slate-300 nav-active transition-all"><i class="fas fa-users text-xl"></i><span class="text-[9px] font-black mt-1">العملاء</span></button>
        <button onclick="switchTab('transactions')" id="nav-transactions" class="nav-btn flex flex-col items-center text-slate-300 transition-all"><i class="fas fa-plus-circle text-xl"></i><span class="text-[9px] font-black mt-1">عملية</span></button>
        <button onclick="switchTab('reports')" id="nav-reports" class="nav-btn flex flex-col items-center text-slate-300 transition-all"><i class="fas fa-chart-pie text-xl"></i><span class="text-[9px] font-black mt-1">التقارير</span></button>
        <button onclick="switchTab('settings')" id="nav-settings" class="nav-btn flex flex-col items-center text-slate-300 transition-all"><i class="fas fa-user-shield text-xl"></i><span class="text-[9px] font-black mt-1">الإعدادات</span></button>
    </nav>

    <div id="custModal" class="modal no-print">
        <div class="bg-white w-full max-w-lg rounded-[3rem] p-10 shadow-2xl relative">
            <h3 id="modalTitle" class="text-2xl font-black mb-8">إدارة العميل</h3>
            <div class="space-y-4">
                <input type="hidden" id="editCustId">
                <input type="text" id="custName" placeholder="اسم العميل" class="w-full p-5 bg-slate-50 rounded-2xl ring-1 ring-slate-200 font-bold outline-none focus:ring-2 focus:ring-blue-600 transition-all">
                <input type="text" id="custPhone" placeholder="رقم الهاتف" class="w-full p-5 bg-slate-50 rounded-2xl ring-1 ring-slate-200 font-bold outline-none focus:ring-2 focus:ring-blue-600 transition-all">
                <div id="initRow" class="flex gap-3">
                    <input type="number" id="custInitAmount" placeholder="الرصيد" class="w-2/3 p-5 bg-slate-50 rounded-2xl ring-1 ring-slate-200 font-black text-center text-2xl">
                    <select id="custInitType" class="w-1/3 p-5 bg-slate-50 rounded-2xl ring-1 ring-slate-200 font-bold">
                        <option value="credit">له</option>
                        <option value="debt">عليه</option>
                    </select>
                </div>
                <div class="flex gap-2 pt-6">
                    <button onclick="saveCustomer()" class="flex-1 bg-blue-600 text-white font-black py-5 rounded-2xl text-lg shadow-xl shadow-blue-100 hover:bg-blue-700">تأكيد وحفظ</button>
                    <button onclick="closeModal('custModal')" class="px-8 bg-slate-100 text-slate-400 font-bold rounded-2xl hover:bg-red-50 hover:text-red-500 transition-all">إلغاء</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let users = JSON.parse(localStorage.getItem('cloud_users_v41')) || [];
    let currentUser = JSON.parse(sessionStorage.getItem('active_cloud_user')) || null;
    let customers = [], transactions = [], currencies = [], currentType = 'deposit';

    window.onload = () => { if(currentUser) showApp(); };

    function showToast(msg, type = 'success') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast toast-${type==='success'?'success':'danger'}`;
        toast.style.background = type === 'success' ? '#10b981' : '#ef4444';
        toast.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':'fa-exclamation-triangle'}"></i> <span>${msg}</span>`;
        container.appendChild(toast);
        setTimeout(() => { toast.style.transform = 'translateX(-150%)'; setTimeout(() => toast.remove(), 500); }, 3000);
    }

    function toggleAuth(isLogin) {
        document.getElementById('loginBox').classList.toggle('hidden', !isLogin);
        document.getElementById('signUpBox').classList.toggle('hidden', isLogin);
    }

    function handleSignUp() {
        const n = document.getElementById('regName').value, e = document.getElementById('regEmail').value, p = document.getElementById('regPass').value;
        if(n && e && p) {
            if(users.find(u=>u.email===e)) return showToast('هذا البريد مرتبط بحساب سحابي آخر', 'danger');
            users.push({ name: n, email: e, pass: p, phone: "", currencies: ['ريال سعودي', 'دولار'], data: { customers: [], transactions: [] } });
            saveUsers(); showToast('تم تفعيل حسابك السحابي! سجل دخولك الآن'); toggleAuth(true);
        }
    }

    function handleLogin() {
        const e = document.getElementById('loginEmail').value, p = document.getElementById('loginPass').value;
        const user = users.find(u => u.email === e && u.pass === p);
        if(user) { 
            currentUser = user; 
            sessionStorage.setItem('active_cloud_user', JSON.stringify(user)); 
            showApp(); 
            showToast(`أهلاً بك م. أيمن، تمت المزامنة بنجاح`); 
        } else showToast('بيانات الدخول السحابية غير صحيحة', 'danger');
    }

    function showApp() {
        document.getElementById('authScreen').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        customers = currentUser.data.customers || [];
        transactions = currentUser.data.transactions || [];
        currencies = currentUser.currencies || ['ريال سعودي', 'دولار'];
        renderCustomers(); renderCurOptions(); fillSettings(); renderGrandTotal();
    }

    function renderCustomers() {
        const q = document.getElementById('searchCust').value.toLowerCase();
        const body = document.getElementById('customerTableBody');
        const tSel = document.getElementById('transTarget'), rSel = document.getElementById('reportTarget');
        body.innerHTML = ''; tSel.innerHTML = ''; rSel.innerHTML = '<option value="">اختر عميل للكشف</option>';

        customers.filter(c => c.name.toLowerCase().includes(q)).forEach((c, idx) => {
            const bals = currencies.map(cur => {
                const b = getBal(c.id, cur);
                return b !== 0 ? `<div class="${b>0?'text-emerald-600':'text-red-500'} text-[10px] font-black">${Math.abs(b).toLocaleString()} ${cur}</div>` : '';
            }).join('');

            body.innerHTML += `
                <tr class="hover:bg-blue-50/50 transition-all">
                    <td class="px-6 py-5 text-slate-300 text-xs">${idx + 1}</td>
                    <td class="px-6 py-5 font-black text-slate-800">${c.name}</td>
                    <td class="px-6 py-5">${bals || '<span class="text-slate-200 italic text-[9px]">حساب مصفر</span>'}</td>
                    <td class="px-6 py-5 text-center">
                        <button onclick="openModal('custModal', ${c.id})" class="text-blue-500 px-3 hover:scale-125 transition-transform"><i class="fas fa-edit"></i></button>
                        <button onclick="delCust(${c.id})" class="text-red-300 px-3 hover:text-red-600 transition-all"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>`;
            tSel.innerHTML += `<option value="${c.id}">${c.name}</option>`;
            rSel.innerHTML += `<option value="${c.id}">${c.name}</option>`;
        });
    }

    function renderGrandTotal() {
        const container = document.getElementById('totalSummaryCards');
        container.innerHTML = '';
        currencies.forEach(cur => {
            const total = transactions.filter(t => t.cur === cur).reduce((s, t) => s + t.amount, 0);
            container.innerHTML += `
                <div class="card-premium p-6 text-center border-b-8 ${total >= 0 ? 'border-emerald-500' : 'border-red-500'}">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">إجمالي ${cur}</p>
                    <h3 class="text-2xl font-black ${total >= 0 ? 'text-emerald-600' : 'text-red-600'}">${Math.abs(total).toLocaleString()}</h3>
                    <p class="text-[9px] font-bold text-slate-400 mt-1">${total >= 0 ? 'صافي مديونية لنا' : 'صافي مديونية علينا'}</p>
                </div>`;
        });
    }

    function autoRestore() {
        const lastData = localStorage.getItem(`backup_${currentUser.email}`);
        if(lastData) {
            currentUser.data = JSON.parse(lastData);
            save(); location.reload();
            showToast('تمت استعادة آخر نسخة سحابية بنجاح');
        } else showToast('لا توجد نسخ سحابية مخزنة مسبقاً لهذا البريد', 'danger');
    }

    function save() { 
        currentUser.data = { customers, transactions };
        const idx = users.findIndex(u => u.email === currentUser.email);
        users[idx] = currentUser;
        localStorage.setItem('cloud_users_v41', JSON.stringify(users));
        localStorage.setItem(`backup_${currentUser.email}`, JSON.stringify(currentUser.data)); // حفظ تلقائي للاستعادة
        sessionStorage.setItem('active_cloud_user', JSON.stringify(currentUser));
        renderGrandTotal();
    }

    // بقية الوظائف الأساسية من V40 (إيداع، سحب، تصفية حساب، إعدادات) مدمجة بالكامل أدناه
    function setTransType(t) { currentType = t; document.getElementById('typeDep').className = t==='deposit'?'p-5 rounded-2xl bg-emerald-50 text-emerald-600 font-black border-2 border-emerald-500':'p-5 rounded-2xl bg-slate-50 text-slate-400 font-black border-2 border-transparent'; document.getElementById('typeWith').className = t==='withdraw'?'p-5 rounded-2xl bg-red-50 text-red-600 font-black border-2 border-red-500':'p-5 rounded-2xl bg-slate-50 text-slate-400 font-black border-2 border-transparent'; }
    function processTransaction() { const id = parseInt(document.getElementById('transTarget').value), amt = parseFloat(document.getElementById('transAmount').value), cur = document.getElementById('transCurrency').value, note = document.getElementById('transNote').value; if(!id || !amt) return showToast('أكمل البيانات أولاً', 'danger'); transactions.push({ id: Date.now(), custId: id, amount: currentType==='deposit'?amt:-amt, cur, note: note || (currentType==='deposit'?'إيداع نقدي':'سحب نقدي'), date: new Date().toLocaleDateString('ar-SA') }); save(); renderCustomers(); showToast('تم المزامنة مع السحابة', currentType==='deposit'?'success':'danger'); document.getElementById('transAmount').value = ''; }
    function updateAccountReport() { const cid = parseInt(document.getElementById('reportTarget').value); const container = document.getElementById('detailedReport'); if(!cid) return; const c = customers.find(x => x.id === cid); document.getElementById('printInfo').innerText = `حساب: ${c.name} | رقم: ${c.phone || '--'}`; const filtered = transactions.filter(t => t.custId === cid).reverse(); container.innerHTML = filtered.map(t => `<div class="bg-white p-5 rounded-2xl border flex justify-between items-center shadow-sm"><div><p class="font-black text-slate-700">${t.note}</p><p class="text-[10px] font-bold text-slate-400 uppercase">${t.date}</p></div><div class="text-left"><p class="font-black text-lg ${t.amount>0?'text-emerald-600':'text-red-600'}">${Math.abs(t.amount).toLocaleString()}</p><p class="text-[9px] font-black text-slate-300 uppercase">${t.cur}</p></div></div>`).join(''); }
    function settleAccount() { const cid = parseInt(document.getElementById('reportTarget').value); if(!cid) return; if(confirm('تصفية؟')) { currencies.forEach(cur => { const b = getBal(cid, cur); if(b !== 0) transactions.push({ id: Date.now()+Math.random(), custId: cid, amount: -b, cur, note: 'تصفية سحابية نهائية', date: new Date().toLocaleDateString('ar-SA') }); }); save(); updateAccountReport(); renderCustomers(); showToast('تم تصفير الحساب'); } }
    function openModal(id, custId = null) { document.getElementById(id).classList.add('active'); if(custId) { const c = customers.find(x => x.id === custId); document.getElementById('modalTitle').innerText = 'تحديث بيانات العميل'; document.getElementById('editCustId').value = c.id; document.getElementById('custName').value = c.name; document.getElementById('custPhone').value = c.phone; document.getElementById('initRow').style.display = 'none'; } else { document.getElementById('modalTitle').innerText = 'عميل سحابي جديد'; document.getElementById('editCustId').value = ''; document.getElementById('custName').value = ''; document.getElementById('custPhone').value = ''; document.getElementById('initRow').style.display = 'flex'; } }
    function saveCustomer() { const id = document.getElementById('editCustId').value, name = document.getElementById('custName').value, phone = document.getElementById('custPhone').value; if(!name) return; if(id) { const idx = customers.findIndex(x => x.id == id); customers[idx].name = name; customers[idx].phone = phone; showToast('تم التحديث بنجاح'); } else { const newId = Date.now(); customers.push({ id: newId, name, phone }); const amt = parseFloat(document.getElementById('custInitAmount').value) || 0, type = document.getElementById('custInitType').value; if(amt !== 0) transactions.push({ id: Date.now()+1, custId: newId, amount: type==='credit'?amt:-amt, cur: currencies[0], note:'رصيد افتتاحي', date: new Date().toLocaleDateString('ar-SA') }); showToast('تمت الإضافة للسحابة'); } save(); renderCustomers(); closeModal('custModal'); }
    function fillSettings() { document.getElementById('setUserName').value = currentUser.name; document.getElementById('setUserEmail').value = currentUser.email; document.getElementById('setUserPhone').value = currentUser.phone || ''; }
    function updateUserProfile() { currentUser.name = document.getElementById('setUserName').value; currentUser.email = document.getElementById('setUserEmail').value; currentUser.phone = document.getElementById('setUserPhone').value; const p = document.getElementById('setUserPass').value; if(p) currentUser.pass = p; save(); showToast('تم تحديث بروفايلك السحابي'); }
    function getBal(cid, cur) { return transactions.filter(t => t.custId === cid && t.cur === cur).reduce((s, t) => s + t.amount, 0); }
    function saveUsers() { localStorage.setItem('cloud_users_v41', JSON.stringify(users)); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    function renderCurOptions() { document.getElementById('transCurrency').innerHTML = currencies.map(c => `<option value="${c}">${c}</option>`).join(''); }
    function switchTab(t) { document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active')); document.getElementById(t).classList.add('active'); document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active')); document.getElementById('nav-'+t).classList.add('nav-active'); }
    function logout() { sessionStorage.clear(); location.reload(); }
    function delCust(id) { if(confirm('حذف؟')) { customers = customers.filter(c => c.id !== id); transactions = transactions.filter(t => t.custId !== id); save(); renderCustomers(); showToast('تم الحذف بنجاح', 'danger'); } }
    function exportData() { const data = JSON.stringify(currentUser.data); const blob = new Blob([data], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Cloud_Backup_${currentUser.name}.json`; a.click(); }
</script>
