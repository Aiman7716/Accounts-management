<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الاستراتيجي الماسي V38 - نسخة المؤسسات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap');
        :root { --primary: #2563eb; --success: #059669; --danger: #dc2626; --bg: #f8fafc; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); color: #1e293b; overflow-x: hidden; }
        .tab-content { display: none; animation: fadeIn 0.4s ease-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
        .card-premium { background: white; border-radius: 28px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); border: 1px solid #f1f5f9; transition: all 0.3s ease; }
        .nav-active { color: var(--primary); font-weight: 900; }
        .status-credit { border-right: 8px solid var(--success); background: linear-gradient(to left, #f0fdf4, #ffffff); }
        .status-debt { border-right: 8px solid var(--danger); background: linear-gradient(to left, #fef2f2, #ffffff); }
        /* تصميم الطباعة */
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .print-only { display: block !important; }
            .card-premium { box-shadow: none; border: 1px solid #eee; }
        }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(5px); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; animation: zoomIn 0.3s ease; }
        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="min-h-screen pb-28">

<div id="authScreen" class="fixed inset-0 z-[110] flex items-center justify-center bg-slate-950 p-6 no-print">
    <div class="bg-white w-full max-w-md rounded-[2.5rem] p-10 shadow-2xl">
        <div id="loginBox">
            <h2 class="text-3xl font-black text-center mb-2">مرحباً بك</h2>
            <p class="text-center text-slate-400 mb-8 font-medium">سجل دخولك للمتابعة</p>
            <div class="space-y-4">
                <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" class="w-full p-4 bg-slate-50 rounded-2xl outline-none ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-600 font-bold">
                <input type="password" id="loginPass" placeholder="كلمة المرور" class="w-full p-4 bg-slate-50 rounded-2xl outline-none ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-600 font-bold">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl text-lg shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">دخول</button>
                <p class="text-center text-sm font-bold text-slate-500 mt-4">ليس لديك حساب؟ <button onclick="toggleAuth(false)" class="text-blue-600 underline">إنشاء حساب جديد</button></p>
            </div>
        </div>
        <div id="signUpBox" class="hidden">
            <h2 class="text-3xl font-black text-center mb-2">حساب جديد</h2>
            <p class="text-center text-slate-400 mb-8 font-medium">انضم لنخبة المستشارين</p>
            <div class="space-y-4">
                <input type="text" id="regName" placeholder="الاسم الكامل" class="w-full p-4 bg-slate-50 rounded-2xl outline-none ring-1 ring-slate-200 font-bold">
                <input type="email" id="regEmail" placeholder="البريد الإلكتروني" class="w-full p-4 bg-slate-50 rounded-2xl outline-none ring-1 ring-slate-200 font-bold">
                <input type="password" id="regPass" placeholder="كلمة المرور" class="w-full p-4 bg-slate-50 rounded-2xl outline-none ring-1 ring-slate-200 font-bold">
                <button onclick="handleSignUp()" class="w-full bg-green-600 text-white font-black py-5 rounded-2xl text-lg shadow-lg">تأكيد التسجيل</button>
                <button onclick="toggleAuth(true)" class="w-full text-slate-400 text-sm font-bold mt-2">لديك حساب؟ سجل دخولك</button>
            </div>
        </div>
    </div>
</div>

<div id="mainApp" class="hidden">
    <header class="glass-header p-4 sticky top-0 z-40 flex justify-between items-center px-6 no-print">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-100 rotate-3"><i class="fas fa-crown"></i></div>
            <h1 class="font-black text-xl text-slate-800">الاستراتيجي <span class="text-blue-600">V38</span></h1>
        </div>
        <button onclick="logout()" class="text-red-500 font-bold text-sm bg-red-50 px-4 py-2 rounded-full">خروج</button>
    </header>

    <main class="max-w-6xl mx-auto p-5 space-y-8">
        <div id="customers" class="tab-content active space-y-6">
            <div class="flex justify-between items-center no-print">
                <h2 class="text-2xl font-black text-slate-800">دفتر العملاء</h2>
                <button onclick="openModal('custModal')" class="bg-blue-600 text-white w-14 h-14 rounded-2xl shadow-xl flex items-center justify-center hover:rotate-90 transition-all duration-500">
                    <i class="fas fa-plus text-xl"></i>
                </button>
            </div>
            <div id="customerList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div id="transactions" class="tab-content max-w-2xl mx-auto no-print">
            <div class="card-premium p-10">
                <h2 class="text-2xl font-black text-center mb-8">حركة مالية</h2>
                <div class="space-y-5">
                    <select id="transTarget" class="w-full p-4 bg-slate-50 rounded-2xl border-none ring-1 ring-slate-200 font-bold"></select>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="transAmount" placeholder="المبلغ" class="p-4 bg-slate-50 rounded-2xl text-center text-xl font-black text-blue-600 ring-1 ring-slate-200">
                        <select id="transCurrency" class="p-4 bg-slate-50 rounded-2xl ring-1 ring-slate-200 font-bold"></select>
                    </div>
                    <select id="transType" class="w-full p-4 bg-slate-50 rounded-2xl ring-1 ring-slate-200 font-bold">
                        <option value="deposit">إيداع (زيادة رصيد له +)</option>
                        <option value="withdraw">سحب (نقص رصيد/عليه -)</option>
                    </select>
                    <textarea id="transNote" placeholder="بيان العملية..." class="w-full p-4 bg-slate-50 rounded-2xl h-24 ring-1 ring-slate-200 outline-none"></textarea>
                    <button onclick="processTransaction()" class="w-full bg-slate-900 text-white font-black py-5 rounded-3xl shadow-2xl hover:bg-blue-600 transition-all">حفظ العملية</button>
                </div>
            </div>
        </div>

        <div id="reports" class="tab-content space-y-6">
            <div class="card-premium p-8 no-print">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-black">كشف الحساب</h2>
                    <div class="flex gap-2">
                        <button onclick="window.print()" class="bg-slate-100 text-slate-600 px-5 py-2 rounded-xl font-bold text-xs hover:bg-slate-200">
                            <i class="fas fa-print ml-1"></i> طباعة الكشف
                        </button>
                        <button onclick="settleAccount()" class="bg-red-500 text-white px-5 py-2 rounded-xl font-bold text-xs">تصفية</button>
                    </div>
                </div>
                <select id="reportTarget" onchange="updateAccountReport()" class="w-full p-4 bg-slate-50 rounded-2xl ring-1 ring-slate-200 font-bold mb-6"></select>
                <div id="reportHeaderInfo" class="hidden print-only text-center mb-8">
                    <h1 class="text-2xl font-bold">كشف حساب مالي</h1>
                    <p id="printCustName" class="text-xl mt-2"></p>
                    <hr class="my-4">
                </div>
                <div id="detailedReport" class="space-y-3"></div>
            </div>
        </div>
    </main>

    <div id="custModal" class="modal no-print">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl relative">
            <button onclick="closeModal('custModal')" class="absolute top-6 left-6 text-slate-300 hover:text-red-500"><i class="fas fa-times-circle text-2xl"></i></button>
            <h3 class="text-2xl font-black mb-6">إضافة عميل جديد</h3>
            <div class="space-y-4">
                <input type="text" id="custName" placeholder="الاسم الكامل للعميل" class="w-full p-4 bg-slate-50 rounded-2xl ring-1 ring-slate-200 outline-none font-bold">
                <input type="text" id="custPhone" placeholder="رقم الجوال" class="w-full p-4 bg-slate-50 rounded-2xl ring-1 ring-slate-200 outline-none font-bold">
                <div class="flex gap-3">
                    <input type="number" id="custInitAmount" placeholder="الرصيد الافتتاحي" class="w-2/3 p-4 bg-slate-50 rounded-2xl ring-1 ring-slate-200 font-bold text-blue-600 text-center">
                    <select id="custInitType" class="w-1/3 p-4 bg-slate-50 rounded-2xl ring-1 ring-slate-200 font-bold text-xs">
                        <option value="credit">رصيد له</option>
                        <option value="debt">رصيد عليه</option>
                    </select>
                </div>
                <button onclick="addCustomer()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-blue-700 transition-all">تفعيل الحساب الآن</button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-lg bg-white/80 backdrop-blur-xl border border-white p-3 rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.1)] flex justify-around z-50 no-print">
        <button onclick="switchTab('customers')" id="nav-customers" class="nav-btn flex flex-col items-center text-slate-300 nav-active"><i class="fas fa-users text-lg"></i><span class="text-[9px] font-black mt-1 uppercase">العملاء</span></button>
        <button onclick="switchTab('transactions')" id="nav-transactions" class="nav-btn flex flex-col items-center text-slate-300"><i class="fas fa-plus-square text-lg"></i><span class="text-[9px] font-black mt-1 uppercase">عملية</span></button>
        <button onclick="switchTab('reports')" id="nav-reports" class="nav-btn flex flex-col items-center text-slate-300"><i class="fas fa-file-invoice text-lg"></i><span class="text-[9px] font-black mt-1 uppercase">تقارير</span></button>
    </nav>
</div>

<script>
    let users = JSON.parse(localStorage.getItem('sys_users')) || [];
    let currentUser = JSON.parse(sessionStorage.getItem('active_user')) || null;

    let customers = [];
    let transactions = [];
    let currencies = ['ريال سعودي', 'دولار', 'ريال يمني'];

    window.onload = () => { if(currentUser) showApp(); };

    function toggleAuth(showLogin) {
        document.getElementById('loginBox').classList.toggle('hidden', !showLogin);
        document.getElementById('signUpBox').classList.toggle('hidden', showLogin);
    }

    function handleSignUp() {
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const pass = document.getElementById('regPass').value;
        if(name && email && pass) {
            if(users.find(u => u.email === email)) return alert('البريد مسجل مسبقاً');
            users.push({ name, email, pass, data: { customers: [], transactions: [] } });
            localStorage.setItem('sys_users', JSON.stringify(users));
            alert('تم إنشاء الحساب! سجل دخولك الآن');
            toggleAuth(true);
        }
    }

    function handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPass').value;
        const user = users.find(u => u.email === email && u.pass === pass);
        if(user) {
            currentUser = user;
            sessionStorage.setItem('active_user', JSON.stringify(user));
            showApp();
        } else { alert('خطأ في البيانات!'); }
    }

    function showApp() {
        document.getElementById('authScreen').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        customers = currentUser.data.customers || [];
        transactions = currentUser.data.transactions || [];
        renderCustomers();
        renderCurOptions();
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active', 'text-blue-600'));
        document.getElementById('nav-'+tabId).classList.add('nav-active');
    }

    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    function addCustomer() {
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;
        const amt = parseFloat(document.getElementById('custInitAmount').value) || 0;
        const type = document.getElementById('custInitType').value;
        if(!name) return;
        const id = Date.now();
        customers.push({ id, name, phone });
        if(amt !== 0) {
            transactions.push({ id: id+1, custId: id, amount: type==='credit'?amt:-amt, cur: currencies[0], note:'رصيد افتتاحي', date: new Date().toLocaleDateString('ar-SA') });
        }
        save(); renderCustomers(); closeModal('custModal');
        document.getElementById('custName').value = '';
    }

    function renderCustomers() {
        const list = document.getElementById('customerList');
        const tSel = document.getElementById('transTarget');
        const rSel = document.getElementById('reportTarget');
        list.innerHTML = ''; tSel.innerHTML = ''; rSel.innerHTML = '<option value="">اختر عميل للكشف</option>';

        customers.forEach(c => {
            const bal = currencies.reduce((sum, cur) => sum + getBal(c.id, cur), 0);
            const statusClass = bal > 0 ? 'status-credit' : (bal < 0 ? 'status-debt' : '');
            
            list.innerHTML += `
                <div class="card-premium p-6 ${statusClass}">
                    <div class="flex justify-between mb-4">
                        <div><h3 class="font-black text-slate-800">${c.name}</h3><p class="text-[10px] text-slate-400 font-bold">${c.phone}</p></div>
                        <button onclick="delCust(${c.id})" class="text-red-300 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>
                    </div>
                    <div class="space-y-1 border-t pt-3">
                        ${currencies.map(cur => {
                            const b = getBal(c.id, cur);
                            return b !== 0 ? `<div class="flex justify-between text-xs font-bold ${b>0?'text-green-600':'text-red-600'}"><span>${cur}</span><span>${Math.abs(b).toLocaleString()}</span></div>` : '';
                        }).join('') || '<p class="text-center text-[10px] italic text-slate-300">لا توجد أرصدة</p>'}
                    </div>
                </div>`;
            tSel.innerHTML += `<option value="${c.id}">${c.name}</option>`;
            rSel.innerHTML += `<option value="${c.id}">${c.name}</option>`;
        });
    }

    function processTransaction() {
        const id = parseInt(document.getElementById('transTarget').value);
        const amt = parseFloat(document.getElementById('transAmount').value);
        const type = document.getElementById('transType').value;
        const cur = document.getElementById('transCurrency').value;
        const note = document.getElementById('transNote').value;
        if(id && amt) {
            transactions.push({ id: Date.now(), custId: id, amount: type==='deposit'?amt:-amt, cur, note, date: new Date().toLocaleDateString('ar-SA') });
            save(); alert('تم الحفظ'); renderCustomers();
        }
    }

    function updateAccountReport() {
        const cid = parseInt(document.getElementById('reportTarget').value);
        const container = document.getElementById('detailedReport');
        if(!cid) return;
        const c = customers.find(x => x.id === cid);
        document.getElementById('printCustName').innerText = "العميل: " + c.name;
        const filtered = transactions.filter(t => t.custId === cid).reverse();
        container.innerHTML = filtered.map(t => `
            <div class="bg-white p-4 rounded-2xl border flex justify-between items-center shadow-sm">
                <div><p class="font-bold text-slate-700">${t.note}</p><p class="text-[10px] text-slate-400 font-bold uppercase">${t.date}</p></div>
                <div class="text-left"><p class="font-black ${t.amount>0?'text-green-600':'text-red-600'}">${Math.abs(t.amount).toLocaleString()}</p><p class="text-[9px] text-slate-300 uppercase">${t.cur}</p></div>
            </div>`).join('');
    }

    function getBal(cid, cur) { return transactions.filter(t => t.custId === cid && t.cur === cur).reduce((s, t) => s + t.amount, 0); }
    function save() { 
        currentUser.data = { customers, transactions };
        const idx = users.findIndex(u => u.email === currentUser.email);
        users[idx] = currentUser;
        localStorage.setItem('sys_users', JSON.stringify(users));
        sessionStorage.setItem('active_user', JSON.stringify(currentUser));
    }
    function renderCurOptions() { document.getElementById('transCurrency').innerHTML = currencies.map(c => `<option value="${c}">${c}</option>`).join(''); }
    function logout() { sessionStorage.clear(); location.reload(); }
    function delCust(id) { if(confirm('حذف؟')) { customers = customers.filter(c => c.id !== id); transactions = transactions.filter(t => t.custId !== id); save(); renderCustomers(); } }
    function settleAccount() {
        const cid = parseInt(document.getElementById('reportTarget').value);
        if(!cid) return;
        if(confirm('تصفية الحساب لصفر؟')) {
            currencies.forEach(cur => {
                const b = getBal(cid, cur);
                if(b !== 0) transactions.push({ id: Date.now()+Math.random(), custId: cid, amount: -b, cur, note: 'تصفية حساب نهائية', date: new Date().toLocaleDateString('ar-SA') });
            });
            save(); updateAccountReport(); renderCustomers();
        }
    }
</script>
</body>
</html>
