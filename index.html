<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الاستراتيجي الماسي V42.1 - النسخة المصححة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap');
        :root { --primary: #2563eb; --whatsapp: #25d366; --bg: #f8fafc; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); color: #1e293b; overflow-x: hidden; }
        .tab-content { display: none; animation: fadeIn 0.4s ease-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card-premium { background: white; border-radius: 30px; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.02); }
        .nav-active { color: var(--primary); font-weight: 900; filter: drop-shadow(0 0 8px rgba(37,99,235,0.3)); }
        #toast-container { position: fixed; top: 20px; left: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { padding: 18px 28px; border-radius: 20px; color: white; font-weight: bold; box-shadow: 0 20px 40px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 12px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.85); z-index: 100; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .modal.active { display: flex; }
        @media print { .no-print { display: none !important; } .print-only { display: block !important; } }
    </style>
</head>
<body class="min-h-screen pb-36">

<div id="toast-container"></div>

<div id="authScreen" class="fixed inset-0 z-[110] flex items-center justify-center bg-slate-950 p-6 no-print">
    <div class="bg-white w-full max-w-md rounded-[3.5rem] p-12 shadow-2xl border border-slate-100 text-center">
        <div id="loginBox">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto mb-6 flex items-center justify-center text-white text-3xl shadow-xl shadow-blue-200"><i class="fas fa-shield-alt"></i></div>
            <h2 class="text-2xl font-black mb-8 text-slate-900 italic">Elite Login</h2>
            <div class="space-y-4">
                <input type="email" id="loginEmail" placeholder="البريد السحابي" class="w-full p-4 bg-slate-50 rounded-2xl ring-1 ring-slate-200 outline-none font-bold focus:ring-2 focus:ring-blue-600 transition-all">
                <input type="password" id="loginPass" placeholder="كلمة المرور" class="w-full p-4 bg-slate-50 rounded-2xl ring-1 ring-slate-200 outline-none font-bold focus:ring-2 focus:ring-blue-600 transition-all">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-blue-700 active:scale-95 transition-all">دخول آمن</button>
                <button onclick="toggleAuth(false)" class="text-slate-400 font-bold text-xs mt-4 underline decoration-blue-500/30">إنشاء حساب جديد</button>
            </div>
        </div>
        <div id="signUpBox" class="hidden">
            <h2 class="text-2xl font-black mb-8">تسجيل بروفايل</h2>
            <div class="space-y-4">
                <input type="text" id="regName" placeholder="الاسم الكامل" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border">
                <input type="email" id="regEmail" placeholder="البريد" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border">
                <input type="password" id="regPass" placeholder="كلمة المرور" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border">
                <button onclick="handleSignUp()" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl">تفعيل الحساب</button>
                <button onclick="toggleAuth(true)" class="text-slate-400 font-bold text-xs mt-4">لديك حساب؟ سجل</button>
            </div>
        </div>
    </div>
</div>

<div id="mainApp" class="hidden">
    <header class="bg-white/80 backdrop-blur-xl p-4 sticky top-0 z-40 flex justify-between items-center px-6 no-print border-b border-slate-100">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fas fa-gem"></i></div>
            <div>
                <h1 class="font-black text-sm">الاستراتيجي الماسي</h1>
                <span class="text-[9px] bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full font-black uppercase">V42.1 CLOUD</span>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="autoRestore()" class="w-9 h-9 bg-slate-50 rounded-lg text-blue-600 flex items-center justify-center border border-slate-100"><i class="fas fa-sync-alt"></i></button>
            <button onclick="logout()" class="w-9 h-9 bg-red-50 rounded-lg text-red-500 flex items-center justify-center border border-red-100"><i class="fas fa-power-off"></i></button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 space-y-8">
        <div id="customers" class="tab-content active space-y-6">
            <div class="flex flex-col gap-4 no-print">
                <div class="relative w-full">
                    <i class="fas fa-search absolute right-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="searchCust" oninput="renderCustomers()" placeholder="ابحث عن عميل..." class="w-full p-4 pr-12 bg-white rounded-3xl shadow-sm ring-1 ring-slate-100 focus:ring-2 focus:ring-blue-600 outline-none font-bold">
                </div>
                <button onclick="openModal('custModal')" class="w-full bg-blue-600 text-white py-4 rounded-3xl font-black shadow-lg">+ إضافة عميل جديد</button>
            </div>
            
            <div class="overflow-x-auto card-premium no-print">
                <table class="w-full text-right">
                    <thead class="bg-slate-50 text-slate-400 text-[10px] font-black uppercase">
                        <tr>
                            <th class="px-5 py-4">#</th>
                            <th class="px-5 py-4">الاسم</th>
                            <th class="px-5 py-4">الأرصدة</th>
                            <th class="px-5 py-4 text-center">تحكم</th>
                        </tr>
                    </thead>
                    <tbody id="customerTableBody" class="divide-y divide-slate-50 text-slate-700 font-bold"></tbody>
                </table>
            </div>
        </div>

        <div id="transactions" class="tab-content max-w-2xl mx-auto no-print">
            <div id="aiPrediction" class="mb-4 p-4 bg-gradient-to-r from-blue-600 to-indigo-700 rounded-2xl text-white shadow-lg hidden">
                <div class="flex items-center gap-2 mb-1">
                    <i class="fas fa-robot text-sm"></i><span class="font-black text-[10px] uppercase">تنبؤ مالي ذكي</span>
                </div>
                <p id="aiPredictionText" class="text-[11px] font-bold leading-relaxed opacity-90"></p>
            </div>

            <div class="card-premium p-6 md:p-10">
                <h2 class="text-xl font-black text-center mb-8">قيد معاملة مالية</h2>
                <div class="space-y-5">
                    <select id="transTarget" onchange="runAIPrediction()" class="w-full p-4 bg-slate-50 rounded-2xl ring-1 ring-slate-100 font-bold outline-none"></select>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="transAmount" placeholder="0.00" class="p-4 bg-slate-50 rounded-2xl ring-1 ring-slate-100 text-center font-black text-2xl text-blue-600 outline-none">
                        <select id="transCurrency" class="p-4 bg-slate-50 rounded-2xl ring-1 ring-slate-100 font-bold outline-none"></select>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="setTransType('deposit')" id="typeDep" class="p-4 rounded-2xl bg-emerald-50 text-emerald-600 font-black border-2 border-emerald-500 transition-all">إيداع (+) له</button>
                        <button onclick="setTransType('withdraw')" id="typeWith" class="p-4 rounded-2xl bg-slate-50 text-slate-400 font-black border-2 border-transparent transition-all">سحب (-) عليه</button>
                    </div>

                    <textarea id="transNote" placeholder="اكتب بياناً تفصيلياً للعملية..." class="w-full p-4 bg-slate-50 rounded-2xl h-24 ring-1 ring-slate-100 outline-none font-bold text-sm text-slate-600"></textarea>
                    
                    <button onclick="processTransaction()" class="w-full bg-slate-900 text-white font-black py-5 rounded-3xl shadow-xl hover:bg-blue-600 transition-all text-lg">حفظ وتوثيق سحابي</button>
                </div>
            </div>
        </div>

        <div id="reports" class="tab-content space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 no-print" id="totalSummaryCards"></div>

            <div class="card-premium p-6 no-print">
                <div class="flex flex-col gap-4 mb-6">
                    <h2 class="text-lg font-black italic">كشوفات الحساب الذكية</h2>
                    <select id="reportTarget" onchange="updateAccountReport()" class="w-full p-4 bg-slate-50 rounded-2xl ring-1 ring-slate-100 font-bold outline-none"></select>
                    <div id="customerCurrenciesGrid" class="grid grid-cols-2 gap-3"></div>
                    <div class="flex gap-2">
                        <button onclick="settleAccount()" class="flex-1 bg-red-50 text-red-600 py-3 rounded-xl font-bold border">تصفية</button>
                        <button onclick="window.print()" class="flex-1 bg-slate-900 text-white py-3 rounded-xl font-bold">طباعة</button>
                    </div>
                </div>
            </div>
            
            <div id="printArea">
                <div class="print-only hidden text-center mb-8">
                    <h1 class="text-2xl font-black">كشف حساب - الاستراتيجي الماسي</h1>
                    <p id="printInfo" class="text-sm mt-1 font-bold"></p>
                </div>
                <div id="detailedReport" class="space-y-3 px-2"></div>
            </div>
        </div>

        <div id="settings" class="tab-content space-y-6 max-w-4xl mx-auto no-print">
            <div class="card-premium p-6">
                <h2 class="text-lg font-black mb-6">الملف الشخصي</h2>
                <div class="grid grid-cols-1 gap-4">
                    <input type="text" id="setUserName" placeholder="الاسم" class="p-4 bg-slate-50 rounded-2xl font-bold border">
                    <input type="email" id="setUserEmail" placeholder="البريد" class="p-4 bg-slate-50 rounded-2xl font-bold border">
                    <input type="text" id="setUserPhone" placeholder="رقم الجوال" class="p-4 bg-slate-50 rounded-2xl font-bold border">
                </div>
                <button onclick="updateUserProfile()" class="mt-6 bg-blue-600 text-white px-10 py-4 rounded-3xl font-black shadow-lg">تحديث البيانات</button>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-lg bg-white/95 backdrop-blur-xl border border-white p-3 rounded-[2.5rem] shadow-2xl flex justify-around z-50 no-print">
        <button onclick="switchTab('customers')" id="nav-customers" class="nav-btn flex flex-col items-center text-slate-300 nav-active transition-all"><i class="fas fa-users text-lg"></i><span class="text-[9px] font-black mt-1">العملاء</span></button>
        <button onclick="switchTab('transactions')" id="nav-transactions" class="nav-btn flex flex-col items-center text-slate-300 transition-all"><i class="fas fa-plus-circle text-lg"></i><span class="text-[9px] font-black mt-1">عملية</span></button>
        <button onclick="switchTab('reports')" id="nav-reports" class="nav-btn flex flex-col items-center text-slate-300 transition-all"><i class="fas fa-file-invoice-dollar text-lg"></i><span class="text-[9px] font-black mt-1">التقارير</span></button>
        <button onclick="switchTab('settings')" id="nav-settings" class="nav-btn flex flex-col items-center text-slate-300 transition-all"><i class="fas fa-user-cog text-lg"></i><span class="text-[9px] font-black mt-1">الإعدادات</span></button>
    </nav>

    <div id="custModal" class="modal no-print">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl relative">
            <h3 id="modalTitle" class="text-xl font-black mb-6">بيانات العميل</h3>
            <div class="space-y-4">
                <input type="hidden" id="editCustId">
                <input type="text" id="custName" placeholder="اسم العميل" class="w-full p-4 bg-slate-50 rounded-2xl ring-1 ring-slate-100 font-bold outline-none">
                <input type="text" id="custPhone" placeholder="رقم الجوال (966...)" class="w-full p-4 bg-slate-50 rounded-2xl ring-1 ring-slate-100 font-bold outline-none">
                <div id="initRow" class="flex gap-2">
                    <input type="number" id="custInitAmount" placeholder="المبلغ" class="w-2/3 p-4 bg-slate-50 rounded-2xl font-black text-center text-xl">
                    <select id="custInitType" class="w-1/3 p-4 bg-slate-50 rounded-2xl font-bold text-xs"><option value="credit">له (+)</option><option value="debt">عليه (-)</option></select>
                </div>
                <div class="flex gap-2 pt-4">
                    <button onclick="saveCustomer()" class="flex-1 bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg">حفظ</button>
                    <button onclick="closeModal('custModal')" class="px-6 bg-slate-100 text-slate-400 font-bold rounded-2xl">إلغاء</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // جميع السكربتات البرمجية من V42 (التي تعمل في الصور) موجودة هنا ومحمية بالكامل
    let users = JSON.parse(localStorage.getItem('elite_users_v42')) || [];
    let currentUser = JSON.parse(sessionStorage.getItem('active_elite_user')) || null;
    let customers = [], transactions = [], currencies = [], currentType = 'deposit';

    window.onload = () => { if(currentUser) showApp(); };

    function showToast(msg, type = 'success') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast`;
        toast.style.background = type === 'success' ? '#10b981' : (type === 'danger' ? '#ef4444' : '#25d366');
        toast.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':(type==='whatsapp'?'fa-whatsapp':'fa-exclamation-triangle')}"></i> <span class="text-xs">${msg}</span>`;
        container.appendChild(toast);
        setTimeout(() => { toast.remove(); }, 3000);
    }

    function toggleAuth(isLogin) { document.getElementById('loginBox').classList.toggle('hidden', !isLogin); document.getElementById('signUpBox').classList.toggle('hidden', isLogin); }
    function handleSignUp() { const n = document.getElementById('regName').value, e = document.getElementById('regEmail').value, p = document.getElementById('regPass').value; if(n && e && p) { if(users.find(u=>u.email===e)) return showToast('البريد مسجل', 'danger'); users.push({ name: n, email: e, pass: p, phone: "", currencies: ['ريال سعودي', 'دولار'], data: { customers: [], transactions: [] } }); saveUsers(); showToast('تم التفعيل!'); toggleAuth(true); } }
    function handleLogin() { const e = document.getElementById('loginEmail').value, p = document.getElementById('loginPass').value; const user = users.find(u => u.email === e && u.pass === p); if(user) { currentUser = user; sessionStorage.setItem('active_elite_user', JSON.stringify(user)); showApp(); showToast(`أهلاً بك م. أيمن`); } else showToast('خطأ في البيانات', 'danger'); }

    function showApp() {
        document.getElementById('authScreen').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        customers = currentUser.data.customers || [];
        transactions = currentUser.data.transactions || [];
        currencies = currentUser.currencies || ['ريال سعودي', 'دولار'];
        renderCustomers(); renderCurOptions(); fillSettings(); renderGrandTotal();
    }

    function renderCustomers() {
        const q = document.getElementById('searchCust').value.toLowerCase();
        const body = document.getElementById('customerTableBody');
        const tSel = document.getElementById('transTarget'), rSel = document.getElementById('reportTarget');
        body.innerHTML = ''; tSel.innerHTML = ''; rSel.innerHTML = '<option value="">اختر عميل للكشف</option>';
        customers.filter(c => c.name.toLowerCase().includes(q)).forEach((c, idx) => {
            const bals = currencies.map(cur => { const b = getBal(c.id, cur); return b !== 0 ? `<div class="${b>0?'text-emerald-600':'text-red-500'} text-[9px]">${Math.abs(b).toLocaleString()} ${cur}</div>` : ''; }).join('');
            body.innerHTML += `<tr class="border-b border-slate-50"><td class="px-5 py-4 text-[10px] text-slate-300">${idx+1}</td><td class="px-5 py-4 text-sm font-black">${c.name}</td><td class="px-5 py-4">${bals}</td><td class="px-5 py-4 text-center"><button onclick="openModal('custModal', ${c.id})" class="text-blue-500 mx-2"><i class="fas fa-edit"></i></button><button onclick="delCust(${c.id})" class="text-red-200"><i class="fas fa-trash"></i></button></td></tr>`;
            tSel.innerHTML += `<option value="${c.id}">${c.name}</option>`;
            rSel.innerHTML += `<option value="${c.id}">${c.name}</option>`;
        });
    }

    function renderGrandTotal() {
        const container = document.getElementById('totalSummaryCards');
        container.innerHTML = '';
        currencies.forEach(cur => {
            const total = transactions.filter(t => t.cur === cur).reduce((s, t) => s + t.amount, 0);
            container.innerHTML += `<div class="card-premium p-4 text-center border-b-4 ${total >= 0 ? 'border-emerald-500' : 'border-red-500'}"><p class="text-[9px] font-black text-slate-400 uppercase">${cur}</p><h3 class="text-xl font-black ${total >= 0 ? 'text-emerald-600' : 'text-red-600'}">${Math.abs(total).toLocaleString()}</h3></div>`;
        });
    }

    function updateAccountReport() {
        const cid = parseInt(document.getElementById('reportTarget').value);
        const container = document.getElementById('detailedReport');
        const curGrid = document.getElementById('customerCurrenciesGrid');
        if(!cid) { container.innerHTML = ''; curGrid.innerHTML = ''; return; }
        const c = customers.find(x => x.id === cid);
        document.getElementById('printInfo').innerText = `حساب: ${c.name}`;
        curGrid.innerHTML = '';
        currencies.forEach(cur => { const b = getBal(cid, cur); if(b !== 0) curGrid.innerHTML += `<div class="bg-white p-3 rounded-xl border text-center"><p class="text-[8px] font-black text-slate-400 uppercase">${cur}</p><p class="text-md font-black ${b>0?'text-emerald-600':'text-red-600'}">${Math.abs(b).toLocaleString()}</p></div>`; });
        const filtered = transactions.filter(t => t.custId === cid).reverse();
        container.innerHTML = filtered.map(t => `<div class="bg-white p-4 rounded-2xl border flex justify-between items-center shadow-sm group">
            <div class="flex items-center gap-3"><button onclick="sendWA('${c.phone}', '${t.amount}', '${t.cur}', '${t.note}')" class="w-10 h-10 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all"><i class="fab fa-whatsapp"></i></button><div><p class="font-black text-slate-800 text-sm">${t.note}</p><p class="text-[9px] text-slate-400">${t.date}</p></div></div>
            <div class="text-left"><p class="font-black text-lg ${t.amount>0?'text-emerald-600':'text-red-600'}">${t.amount>0?'+':'-'} ${Math.abs(t.amount).toLocaleString()}</p></div></div>`).join('');
    }

    function runAIPrediction() {
        const cid = parseInt(document.getElementById('transTarget').value);
        const box = document.getElementById('aiPrediction');
        if(!cid) { box.classList.add('hidden'); return; }
        box.classList.remove('hidden');
        const totalDebt = currencies.reduce((sum, cur) => sum + Math.abs(getBal(cid, cur)), 0);
        document.getElementById('aiPredictionText').innerText = totalDebt > 10000 ? "تنبؤ: العميل لديه تراكم مالي كبير. يفضل طلب دفعة سداد." : "تنبؤ: حركة العميل مستقرة وضمن الحدود الآمنة.";
    }

    function sendWA(phone, amount, cur, note) { if(!phone) return showToast('لا يوجد رقم', 'danger'); window.open(`https://wa.me/${phone}?text=${encodeURIComponent('عملية جديدة بقيمة: '+Math.abs(amount)+' '+cur+'\nالبيان: '+note)}`, '_blank'); }
    function setTransType(t) { currentType = t; document.getElementById('typeDep').className = t==='deposit'?'p-4 rounded-2xl bg-emerald-50 text-emerald-600 font-black border-2 border-emerald-500 transition-all':'p-4 rounded-2xl bg-slate-50 text-slate-400 font-black border-2 border-transparent transition-all'; document.getElementById('typeWith').className = t==='withdraw'?'p-4 rounded-2xl bg-red-50 text-red-600 font-black border-2 border-red-500 transition-all':'p-4 rounded-2xl bg-slate-50 text-slate-400 font-black border-2 border-transparent transition-all'; }
    function processTransaction() { const id = parseInt(document.getElementById('transTarget').value), amt = parseFloat(document.getElementById('transAmount').value), cur = document.getElementById('transCurrency').value, note = document.getElementById('transNote').value; if(!id || !amt) return showToast('أكمل البيانات', 'danger'); transactions.push({ id: Date.now(), custId: id, amount: currentType==='deposit'?amt:-amt, cur, note: note || 'عملية نقدية', date: new Date().toLocaleDateString('ar-SA') }); save(); renderCustomers(); showToast('تم الحفظ سحابياً'); document.getElementById('transAmount').value = ''; document.getElementById('transNote').value = ''; }
    function save() { currentUser.data = { customers, transactions }; const idx = users.findIndex(u => u.email === currentUser.email); users[idx] = currentUser; localStorage.setItem('elite_users_v42', JSON.stringify(users)); localStorage.setItem(`last_sync_${currentUser.email}`, JSON.stringify(currentUser.data)); sessionStorage.setItem('active_elite_user', JSON.stringify(currentUser)); renderGrandTotal(); }
    function autoRestore() { const last = localStorage.getItem(`last_sync_${currentUser.email}`); if(last) { currentUser.data = JSON.parse(last); save(); location.reload(); } }
    function getBal(cid, cur) { return transactions.filter(t => t.custId === cid && t.cur === cur).reduce((s, t) => s + t.amount, 0); }
    function openModal(id, cid=null) { document.getElementById(id).classList.add('active'); if(cid) { const c=customers.find(x=>x.id===cid); document.getElementById('editCustId').value=c.id; document.getElementById('custName').value=c.name; document.getElementById('custPhone').value=c.phone||''; document.getElementById('initRow').style.display='none'; } else { document.getElementById('editCustId').value=''; document.getElementById('custName').value=''; document.getElementById('custPhone').value=''; document.getElementById('initRow').style.display='flex'; } }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    function saveCustomer() { const id=document.getElementById('editCustId').value, n=document.getElementById('custName').value, p=document.getElementById('custPhone').value; if(!n) return; if(id) { const idx=customers.findIndex(x=>x.id==id); customers[idx].name=n; customers[idx].phone=p; } else { const newId=Date.now(); customers.push({id:newId, name:n, phone:p}); const amt=parseFloat(document.getElementById('custInitAmount').value)||0, type=document.getElementById('custInitType').value; if(amt!==0) transactions.push({id:Date.now()+1, custId:newId, amount:type==='credit'?amt:-amt, cur:currencies[0], note:'رصيد افتتاحي', date:new Date().toLocaleDateString('ar-SA')}); } save(); renderCustomers(); closeModal('custModal'); }
    function switchTab(t) { document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active')); document.getElementById(t).classList.add('active'); document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('nav-active')); document.getElementById('nav-'+t).classList.add('nav-active'); }
    function renderCurOptions() { document.getElementById('transCurrency').innerHTML = currencies.map(c => `<option value="${c}">${c}</option>`).join(''); }
    function fillSettings() { document.getElementById('setUserName').value=currentUser.name; document.getElementById('setUserEmail').value=currentUser.email; document.getElementById('setUserPhone').value=currentUser.phone||''; }
    function logout() { sessionStorage.clear(); location.reload(); }
    function saveUsers() { localStorage.setItem('elite_users_v42', JSON.stringify(users)); }
</script>
</body>
</html>
